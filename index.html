<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supra Airdrop</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0c0f1c;
    color: white;
    text-align: center;
}

.container {
    padding: 40px 20px;
}

h1 {
    color: #00f7ff;
    font-size: 36px;
}

.card {
    background: #151933;
    padding: 25px;
    border-radius: 15px;
    max-width: 400px;
    margin: auto;
    box-shadow: 0 0 20px rgba(0,255,255,0.2);
}

input {
    width: 90%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    text-align: center;
}

button {
    padding: 12px 20px;
    margin-top: 10px;
    background: #00f7ff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    width: 95%;
}

button:hover {
    background: #00c3cc;
}

button:disabled {
    background: gray;
    cursor: not-allowed;
}

.progress {
    width: 100%;
    background: #222;
    border-radius: 10px;
    margin-top: 15px;
}

.progress-bar {
    width: 65%;
    height: 10px;
    background: #00f7ff;
    border-radius: 10px;
}

.timer {
    margin-top: 10px;
    color: #aaa;
}

.status {
    margin-top: 10px;
    font-size: 14px;
}
</style>

</head>
<body>

<div class="container">
    <h1>🚀 Supra Airdrop</h1>
    <p>Join now and get free SUPRA tokens!</p>

    <div class="card">

        <!-- CONNECT WALLET -->
        <button onclick="connectWallet()">🔗 Connect Wallet</button>

        <!-- WALLET INPUT -->
        <input type="text" id="wallet" placeholder="Wallet address will appear here" readonly>

        <!-- JOIN -->
        <button id="joinBtn" onclick="joinAirdrop()">Join Airdrop</button>

        <!-- PROGRESS -->
        <div class="progress">
            <div class="progress-bar"></div>
        </div>
        <p>65% claimed</p>

        <!-- TIMER -->
        <div class="timer" id="countdown"></div>

        <!-- CLAIM -->
        <button onclick="claim()">Claim Tokens</button>

        <!-- STATUS -->
        <div class="status" id="status"></div>

    </div>
</div>

<script>

// =====================
// COUNTDOWN
// =====================
var countDownDate = new Date().getTime() + (24 * 60 * 60 * 1000);

setInterval(function() {
    var now = new Date().getTime();
    var distance = countDownDate - now;

    var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    var minutes = Math.floor((distance % (1000 * 60)) / (1000 * 60));
    var seconds = Math.floor((distance % (1000)) / 1000);

    document.getElementById("countdown").innerHTML =
        "Ends in: " + hours + "h " + minutes + "m " + seconds + "s";

}, 1000);


// =====================
// CONNECT WALLET
// =====================
async function connectWallet() {
    let status = document.getElementById("status");

    if (typeof window.ethereum === "undefined") {
        status.innerHTML = "❌ MetaMask not installed";
        return;
    }

    try {
        const accounts = await window.ethereum.request({
            method: "eth_requestAccounts"
        });

        const wallet = accounts[0];
        document.getElementById("wallet").value = wallet;

        status.innerHTML = "✅ Connected: " + wallet.slice(0,6) + "...";

    } catch (err) {
        status.innerHTML = "❌ Connection rejected";
    }
}


// =====================
// JOIN AIRDROP (API)
// =====================
async function joinAirdrop() {
    let wallet = document.getElementById("wallet").value;
    let btn = document.getElementById("joinBtn");
    let status = document.getElementById("status");

    if(wallet === "") {
        status.innerHTML = "❌ Connect wallet first";
        return;
    }

    btn.disabled = true;
    btn.innerText = "Processing...";
    status.innerHTML = "⏳ Sending request...";

    try {
        const res = await fetch("/api/join", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ wallet })
        });

        const data = await res.json();

        if(data.success) {
            status.innerHTML = "✅ Joined Airdrop!";
        } else {
            status.innerHTML = "❌ " + data.message;
        }

    } catch (err) {
        status.innerHTML = "❌ Server error";
    }

    btn.disabled = false;
    btn.innerText = "Join Airdrop";
}


// =====================
// CLAIM (DUMMY)
// =====================
function claim() {
    document.getElementById("status").innerHTML =
        "⚠️ Claim feature coming soon!";
}

</script>

</body>
</html>
